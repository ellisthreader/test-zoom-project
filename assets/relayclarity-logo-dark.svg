    <circle cx="15.5" cy="39" r="9.5" fill="#0B1526" stroke="#FFFFFF" stroke-width="7"/>
    <circle cx="38.2" cy="18" r="9.5" fill="#0B1526" stroke="#FFFFFF" stroke-width="7"/>
    <circle cx="51.2" cy="39.7" r="9.5" fill="#0B1526" stroke="#2DD4BF" stroke-width="7"/>
