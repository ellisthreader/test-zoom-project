<svg width="332" height="58" viewBox="0 0 332 58" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RelayClarity logo</title>
  <desc id="desc">RelayClarity wordmark for dark backgrounds with a precise three-node relay mark.</desc>
  <defs>
    <linearGradient id="relayAccentDark" x1="39" y1="18" x2="55" y2="42" gradientUnits="userSpaceOnUse">
