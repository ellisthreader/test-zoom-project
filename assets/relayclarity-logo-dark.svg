    <linearGradient id="clarityWordDark" x1="139" y1="15" x2="232" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <g transform="translate(8 0)" aria-hidden="true">
    <path
